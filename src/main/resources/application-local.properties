spring.datasource.url=${GST_DB_URL:jdbc:postgresql://localhost:5432/gstdb}
spring.datasource.username=${GST_DB_USERNAME:gstdb}
spring.datasource.password=${GST_DB_PASSWORD:gstdb}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.table=flyway_schema_history_gst

security.jwt.enforce=false
