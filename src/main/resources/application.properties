spring.application.name=gst-service
server.port=${SERVER_PORT:8091}

spring.config.import=optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://localhost:8888}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_gst

management.endpoints.web.exposure.include=health,info,prometheus
logging.pattern.level=%5p [${spring.application.name:},%X{requestId:-}]

spring.cloud.circuitbreaker.resilience4j.enabled=true
management.health.circuitbreakers.enabled=true

gst.tax.default-rate-percent=${GST_DEFAULT_RATE_PERCENT:18}
gst.tax.inclusive-fallback-on-missing-line-percent=${GST_INCLUSIVE_FALLBACK_PERCENT:18}

app.cache.redis-enabled=${APP_CACHE_REDIS_ENABLED:false}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
